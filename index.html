<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-BIDI - Thư viện Khế ước No.7</title>
    <style>
        /* TÔNG MÀU MA GIỚI MỜ ẢO */
        body { font-family: 'Segoe UI', sans-serif; background: #120e18; margin: 0; color: white; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* MÀN HÌNH ĐĂNG NHẬP / ĐĂNG KÝ */
        .auth-container { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw;
            background: linear-gradient(rgba(18, 14, 24, 0.85), rgba(43, 27, 65, 0.9)), 
                        url('https://i.ibb.co/6y4t4mH/Hanako-Background-Maw-Ao.jpg'); 
            background-size: cover; background-position: center;
        }
        
        #hanako-avatar {
            width: 130px; height: 130px; border-radius: 50%;
            object-fit: cover; border: 4px solid #d175ff; 
            box-shadow: 0 0 25px #d175ff; margin-bottom: -65px; z-index: 10;
        }
        
        .auth-box { 
            background: rgba(43, 27, 65, 0.9); padding: 80px 40px 40px 40px; 
            border-radius: 20px; box-shadow: 0 10px 50px rgba(111, 44, 163, 0.5);
            width: 340px; text-align: center; border: 2px solid #6f2ca3; z-index: 5;
        }
        
        input, textarea { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #6f2ca3; border-radius: 10px; box-sizing: border-box; 
            background: rgba(18, 14, 24, 0.7); color: white; transition: 0.3s;
        }
        input:focus { border-color: #d175ff; outline: none; box-shadow: 0 0 10px rgba(209, 117, 255, 0.3); }
        
        #msg { margin: 10px 0; padding: 10px; border-radius: 8px; font-size: 0.75rem; text-align: left; line-height: 1.4; }
        .msg-error { background: rgba(255, 0, 0, 0.2); color: #ff9999; border: 1px solid red; }
        .msg-success { background: rgba(0, 255, 0, 0.2); color: #99ff99; border: 1px solid green; }
        
        button { 
            background: #6f2ca3; color: white; border: none; padding: 12px; 
            border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; 
            margin-top: 10px; transition: 0.3s; 
        }
        button:hover { background: #d175ff; box-shadow: 0 0 20px #d175ff; transform: translateY(-1px); }
        button:disabled { background: #444; cursor: not-allowed; }

        /* GIAO DIỆN CHÍNH (HOME) */
        #home-screen { display: grid; grid-template-columns: 260px 1fr; height: 100vh; width: 100vw; }
        
        .sidebar { 
            background: rgba(43, 27, 65, 0.8); padding: 30px; 
            border-right: 2px solid #6f2ca3; display: flex; flex-direction: column; align-items: center; 
        }
        
        .user-info { 
            background: rgba(18, 14, 24, 0.6); border: 1px solid #6f2ca3; 
            padding: 15px; border-radius: 12px; width: 100%; text-align: center; margin: 20px 0; 
        }
        
        .menu-item { 
            width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; 
            background: none; border: 1px solid transparent; color: #aaa; 
            text-align: left; cursor: pointer; transition: 0.3s;
        }
        .menu-item:hover, .menu-item.active { background: rgba(111, 44, 163, 0.4); color: white; border-color: #6f2ca3; }

        .main-content { padding: 40px; overflow-y: auto; background: #120e18; }
        .post-box { 
            background: rgba(43, 27, 65, 0.4); padding: 25px; 
            border-radius: 15px; border: 1px solid #6f2ca3; 
        }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <img id="hanako-avatar" src="https://i.ibb.co/tjkkkk/Hanako-kun-Avatar-Fixed.jpg">
        <div class="auth-box">
            <h2 id="form-title" style="color: #d175ff; margin: 0;">S-BIDI</h2>
            <p style="font-size: 0.75rem; color: #aaa; margin-bottom: 20px;">Thư viện Khế ước No.7</p>
            
            <input type="text" id="username" class="hidden" placeholder="Tên ma giới của ông">
            <input type="email" id="gmail" placeholder="Địa chỉ @gmail.com">
            <input type="password" id="password" placeholder="Mật khẩu (8+ ký tự, A, a, 1, @)">
            
            <div id="msg" class="hidden"></div>
            
            <button onclick="handleAuth()" id="main-btn">Xác nhận khế ước</button>
            <p id="toggle-text" onclick="toggleForm()" style="cursor:pointer; color:#d175ff; margin-top:15px; font-size:0.8rem;">Chưa có khế ước? Đăng ký</p>
        </div>
    </div>

    <div id="home-screen" class="hidden">
        <aside class="sidebar">
            <h2 style="color: #d175ff; text-shadow: 0 0 10px #d175ff;">S-BIDI</h2>
            <div class="user-info">
                <span id="display-name" style="color: #d175ff; font-weight: bold;"></span><br>
                <b id="user-points" style="font-size: 2rem; color: #28a745;">0</b><br>
                <small style="color: #aaa;">Ma lực tích lũy</small>
            </div>
            
            <button class="menu-item active">Thư viện Khế ước</button>
            <button class="menu-item">Truyện của tôi</button>
            <button class="menu-item">Cài đặt</button>
            
            <button onclick="logout()" class="menu-item" style="color: #ff4d4d; margin-top: auto; border: 1px solid #ff4d4d33;">Hủy khế ước (Thoát)</button>
        </aside>

        <main class="main-content">
            <h1 style="border-bottom: 2px solid #6f2ca3; padding-bottom: 10px; color: #f0f0f0;">Thư viện Khế ước</h1>
            <div class="post-box">
                <textarea id="post-content" placeholder="Viết khế ước truyện mới của ông vào đây... (Ít nhất 10 từ)"></textarea>
                <div style="text-align: right;">
                    <button onclick="addPost()" id="post-btn" style="width: auto; padding: 10px 30px;">Phong ấn truyện (+10đ)</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx0TuHaaZ7ivMQqwWd_qsBVZ0sDahsvd80Kn2DwrVKWKSAyhs-1aLC7oD3qW_zk8IPt/exec"; // <-- Nhớ thay link này
        let isLogin = true;

        function showMsg(t, type) {
            const m = document.getElementById('msg');
            m.innerText = t; m.className = type === 'error' ? 'msg-error' : 'msg-success';
            m.classList.remove('hidden');
        }

        // PHÁP THUẬT KIỂM TRA EMAIL & MẬT KHẨU
        function validateEmail(email) {
            return /^[a-zA-Z0-9](\.?[a-zA-Z0-9._%+-])+@gmail\.com$/.test(email);
        }

        function validatePassword(pass) {
            // Ít nhất 8 ký tự, 1 hoa, 1 thường, 1 số, 1 ký tự đặc biệt
            return /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/.test(pass);
        }

        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? "S-BIDI" : "Đăng Ký";
            document.getElementById('username').classList.toggle('hidden', isLogin);
            document.getElementById('msg').classList.add('hidden');
            document.getElementById('toggle-text').innerText = isLogin ? "Chưa có tài khoản? Đăng ký" : "Đã có tài khoản? Đăng nhập";
        }

        async function handleAuth() {
            const mail = document.getElementById('gmail').value;
            const pass = document.getElementById('password').value;
            const user = document.getElementById('username').value;
            const btn = document.getElementById('main-btn');

            if (!mail || !pass) return showMsg("Điền đủ thông tin!", "error");
            
            // Chặn email dị dạng
            if (!validateEmail(mail)) return showMsg("Gmail không đúng định dạng (VD: ten@gmail.com)!", "error");
            
            // Check mật khẩu khi đăng ký
            if (!isLogin && !validatePassword(pass)) {
                return showMsg("Mật khẩu quá yếu! Cần ít nhất 8 ký tự, gồm chữ Hoa, chữ Thường, Số và Ký tự đặc biệt.", "error");
            }

            btn.innerText = "Đang vô..."; btn.disabled = true;

            try {
                if (isLogin) {
                    const res = await fetch(`${GAS_URL}?action=login&mail=${mail}&pass=${pass}`);
                    const txt = await res.text();
                    if (txt === "FOUND") {
                        saveAndEntry(mail);
                    } else {
                        showMsg("Thông tin  sai lệch!", "error");
                        btn.innerText = "Xác nhận tài khoản"; btn.disabled = false;
                    }
                } else {
                    // Đăng ký
                    const check = await fetch(`${GAS_URL}?action=check_mail&mail=${mail}`);
                    const checkTxt = await check.text();
                    if (checkTxt === "EXISTED") {
                        showMsg("Gmail này đã lập  rồi!", "error");
                        btn.disabled = false; btn.innerText = "Xác nhận tài khoản";
                    } else {
                        await fetch(GAS_URL, { 
                            method: "POST", 
                            mode: "no-cors", 
                            body: JSON.stringify({ action: "signup", user, pass, mail }) 
                        });
                        // ĐĂNG KÝ XONG VÀO LUÔN
                        saveAndEntry(mail, user);
                    }
                }
            } catch (e) {
                showMsg("Lỗi  hệ thống!", "error");
                btn.disabled = false;
            }
        }

        function saveAndEntry(mail, name = "") {
            localStorage.setItem("s_bidi_mail", mail);
            localStorage.setItem("s_bidi_name", name || mail.split('@')[0]);
            location.reload();
        }

        window.onload = () => {
            const m = localStorage.getItem("s_bidi_mail");
            const n = localStorage.getItem("s_bidi_name");
            if (m) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('home-screen').classList.remove('hidden');
                document.getElementById('display-name').innerText = n;
            }
        };

        async function addPost() {
            const content = document.getElementById('post-content').value;
            if(!content || content.length < 10) return alert("Viết dài thêm chút nữa (ít nhất 10 từ)!");
            
            const btn = document.getElementById('post-btn');
            btn.innerText = "Đang phong ấn..."; btn.disabled = true;

            await fetch(GAS_URL, { 
                method: "POST", 
                mode: "no-cors", 
                body: JSON.stringify({ 
                    action: "addPoint", 
                    mail: localStorage.getItem("s_bidi_mail"), 
                    points: 10 
                }) 
            });
            
            document.getElementById('post-content').value = "";
            let p = document.getElementById('user-points');
            p.innerText = parseInt(p.innerText) + 10;
            btn.innerText = "đăng truyện (+10đ)"; btn.disabled = false;
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
