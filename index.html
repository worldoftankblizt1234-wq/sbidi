<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-BIDI - Hanako No.7 Security</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #120e18; margin: 0; color: white; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        .auth-container { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw;
            background: linear-gradient(rgba(18, 14, 24, 0.8), rgba(43, 27, 65, 0.9)), url('https://tse3.mm.bing.net/th/id/OIP.OKWxeFILTARpLrP7tMSP9wHaKQ?w=664&h=920&rs=1&pid=ImgDetMain&o=7&rm=3'); 
            background-size: cover; background-position: center;
        }
        
        #hanako-avatar {
            width: 130px; height: 130px; border-radius: 50%;
            object-fit: cover; border: 4px solid #d175ff; 
            box-shadow: 0 0 20px #d175ff; margin-bottom: -60px; z-index: 10;
        }
        
        .auth-box { 
            background: rgba(43, 27, 65, 0.9); padding: 70px 40px 40px 40px; 
            border-radius: 20px; box-shadow: 0 10px 40px rgba(111, 44, 163, 0.6);
            width: 330px; text-align: center; border: 2px solid #d175ff; z-index: 5;
        }
        
        input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #6f2ca3; border-radius: 10px; box-sizing: border-box; 
            background: rgba(18, 14, 24, 0.7); color: white;
        }
        
        #msg { margin: 10px 0; padding: 10px; border-radius: 8px; font-size: 0.75rem; text-align: left; line-height: 1.4; }
        .msg-error { background: rgba(255, 0, 0, 0.2); color: #ff9999; border: 1px solid red; }
        .msg-success { background: rgba(0, 255, 0, 0.2); color: #99ff99; border: 1px solid green; }
        
        button { background: #6f2ca3; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #d175ff; box-shadow: 0 0 20px #d175ff; }
        button:disabled { background: #444; }
        
        .navbar { background: #2b1b41; padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid #6f2ca3; }
        .card { background: rgba(43, 27, 65, 0.7); padding: 30px; border-radius: 20px; margin: 20px auto; max-width: 450px; text-align: center; border: 1px solid #6f2ca3; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <img id="hanako-avatar" src="https://i.ibb.co/tjkkkk/Hanako-kun-Avatar-Fixed.jpg">
        <div class="auth-box">
            <h2 id="form-title" style="color: #d175ff;">S-BIDI</h2>
            <input type="text" id="username" class="hidden" placeholder="Tên ">
            <input type="email" id="gmail" placeholder="Địa chỉ ví dụ sbidi@gmail.com">
            <input type="password" id="password" placeholder="Mật khẩu (8+ ký tự, A, a, 1, @)">
            <div id="msg" class="hidden"></div>
            <button onclick="handleAuth()" id="main-btn">Xác nhận</button>
            <p id="toggle-text" onclick="toggleForm()" style="cursor:pointer; color:#d175ff; margin-top:15px; font-size:0.8rem;">Chưa có tài khoản? Đăng ký</p>
        </div>
    </div>

    <div id="home-screen" class="hidden">
        <nav class="navbar"><b>S-BIDI</b> <span onclick="logout()" style="cursor:pointer; color:#ff4d4d">Thoát</span></nav>
        <div class="card">
            <h3>Hồn ma: <span id="display-name" style="color:#d175ff"></span></h3>
            <p>Năng lượng: <b id="user-points" style="font-size:2rem; color: #28a745;">0</b></p>
            <textarea id="post-content" placeholder="Viết câu chuyện mới..." style="width:100%; height:80px; background:#120e18; color:white; border:1px solid #6f2ca3; padding:10px; border-radius:10px;"></textarea>
            <button onclick="addPost()" id="post-btn">Đăng bài (+10đ)</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx0TuHaaZ7ivMQqwWd_qsBVZ0sDahsvd80Kn2DwrVKWKSAyhs-1aLC7oD3qW_zk8IPt/exec";
        let isLogin = true;

        function showMsg(t, type) {
            const m = document.getElementById('msg');
            m.innerText = t; m.className = type === 'error' ? 'msg-error' : 'msg-success';
            m.classList.remove('hidden');
        }

        function validatePassword(pass) {
            // Check: ít nhất 8 ký tự, 1 hoa, 1 thường, 1 số, 1 ký tự đặc biệt
            const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            return regex.test(pass);
        }

        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? "S-BIDI" : "Đăng Ký";
            document.getElementById('username').classList.toggle('hidden', isLogin);
            document.getElementById('msg').classList.add('hidden');
        }

        async function handleAuth() {
            const mail = document.getElementById('gmail').value;
            const pass = document.getElementById('password').value;
            const user = document.getElementById('username').value;
            const btn = document.getElementById('main-btn');

            if (!mail || !pass) return showMsg("Thiếu thông tin khế ước!", "error");
            
            // --- KIỂM TRA ĐỘ KHÓ MẬT KHẨU KHI ĐĂNG KÝ ---
            if (!isLogin && !validatePassword(pass)) {
                return showMsg("Mật khẩu yếu! Cần ít nhất 8 ký tự, gồm chữ Hoa, chữ Thường, Số và Ký tự đặc biệt (VD: @$!%*?&)", "error");
            }

            btn.innerText = "Đang triệu hồi..."; btn.disabled = true;

            try {
                if (isLogin) {
                    const res = await fetch(`${GAS_URL}?action=login&mail=${mail}&pass=${pass}`);
                    const txt = await res.text();
                    if (txt === "FOUND") {
                        saveAndEntry(mail);
                    } else {
                        showMsg("Thông tin ko chính xác!", "error");
                        btn.innerText = "Xác nhận"; btn.disabled = false;
                    }
                } else {
                    // Check trùng mail
                    const check = await fetch(`${GAS_URL}?action=check_mail&mail=${mail}`);
                    const checkTxt = await check.text();
                    if (checkTxt === "EXISTED") {
                        showMsg("Gmail này đã được tạo!", "error");
                        btn.innerText = "Xác nhận"; btn.disabled = false;
                    } else {
                        // Gửi Đăng ký
                        await fetch(GAS_URL, {
                            method: "POST",
                            mode: "no-cors",
                            body: JSON.stringify({ action: "signup", user, pass, mail })
                        });
                        // ĐĂNG KÝ XONG VÀO LUÔN TẠI ĐÂY
                        saveAndEntry(mail, user);
                    }
                }
            } catch (e) {
                showMsg("Lỗi ma pháp hệ thống!", "error");
                btn.disabled = false;
            }
        }

        function saveAndEntry(mail, name = "") {
            localStorage.setItem("s_bidi_mail", mail);
            localStorage.setItem("s_bidi_name", name || mail.split('@')[0]);
            showMsg("Thành công! Đang vào...", "success");
            setTimeout(() => location.reload(), 1000);
        }

        window.onload = () => {
            const m = localStorage.getItem("s_bidi_mail");
            if (m) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('home-screen').classList.remove('hidden');
                document.getElementById('display-name').innerText = localStorage.getItem("s_bidi_name");
            }
        };

        async function addPost() {
            const mail = localStorage.getItem("s_bidi_mail");
            const content = document.getElementById('post-content').value;
            if(!content) return;
            const btn = document.getElementById('post-btn');
            btn.disabled = true;
            await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "addPoint", mail, points: 10 }) });
            document.getElementById('post-content').value = "";
            let p = document.getElementById('user-points');
            p.innerText = parseInt(p.innerText) + 10;
            btn.disabled = false;
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
