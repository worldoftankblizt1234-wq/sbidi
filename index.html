<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Truyện - Ngày Xanh Vỡ Mộng</title>
    <style>
        :root { --p: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .box { background: white; padding: 25px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .hidden { display: none; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--p); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .user-info { display: flex; justify-content: space-between; background: #eff6ff; padding: 10px; border-radius: 6px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="box">
        <h2>Chào mừng Minh đến với hệ thống</h2>
        <p>Đăng ký để bắt đầu viết truyện & tích điểm</p>
        <input type="text" id="user" placeholder="Tên tài khoản">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button onclick="handleAuth()">Vào hệ thống ngay</button>
        <p id="msg" style="color: red; font-size: 0.8rem;"></p>
    </div>

    <div id="home-screen" class="box hidden">
        <div class="user-info">
            <span id="display-name"><b>User:</b> ...</span>
            <span><b>Điểm:</b> <span id="points">0</span> ⭐</span>
        </div>
        
        <h3>Đăng chương mới</h3>
        <input type="text" id="title" placeholder="Tiêu đề chương (Ví dụ: Chương 1)">
        <textarea id="content" rows="5" placeholder="Nội dung câu chuyện..."></textarea>
        <button onclick="postStory()" id="postBtn" style="background: #059669;">Đăng bài & Nhận 10 điểm</button>
        
        <hr>
        <h3>Truyện đã đăng</h3>
        <div id="story-list" style="font-size: 0.9rem; color: #444;">
            Chưa có bài đăng nào.
        </div>
    </div>

<script>
    // 1. KẾT NỐI: Dán link Google Apps Script của bạn vào đây
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxlVrHMz_9yMbfhk0yiqallOnBafc4TKHpiU9vvHL5j-43RMomAoZ6jLQQMHieRwjfR/exec';
    let currentUser = "";

    // Hàm xử lý Đăng nhập/Đăng ký
    function handleAuth() {
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        if(!user || !pass) return alert("Nhập đủ tên và mật khẩu nhé!");

        document.getElementById('msg').innerText = "Đang xác thực...";
        
        // Gửi dữ liệu qua Google Sheets
        fetch(scriptURL, {
            method: 'POST',
            body: new URLSearchParams({'action': 'auth', 'user': user, 'pass': pass})
        })
        .then(() => {
            // Giả lập đăng nhập thành công để vào Home ngay
            currentUser = user;
            document.getElementById('display-name').innerText = "Chào, " + user;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
        });
    }

    // Hàm đăng bài và cộng điểm
    function postStory() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;
        if(!title || !content) return alert("Nhập nội dung truyện đã!");

        document.getElementById('postBtn').innerText = "Đang lưu...";

        fetch(scriptURL, {
            method: 'POST',
            body: new URLSearchParams({'action': 'post', 'user': currentUser, 'title': title, 'content': content})
        })
        .then(() => {
            // Cập nhật giao diện khi đăng xong
            let p = parseInt(document.getElementById('points').innerText);
            document.getElementById('points').innerText = p + 10;
            
            const list = document.getElementById('story-list');
            list.innerHTML = `<div><b>${title}:</b> ${content.substring(0, 30)}...</div>` + list.innerHTML;
            
            document.getElementById('title').value = "";
            document.getElementById('content').value = "";
            document.getElementById('postBtn').innerText = "Đăng bài & Nhận 10 điểm";
            alert("Đã đăng truyện và cộng 10 điểm vào Sheets!");
        });
    }
</script>
</body>
</html>
