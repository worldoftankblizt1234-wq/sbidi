<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-BIDI - Thư viện Khế ước No.7</title>
    <style>
        /* TÔNG MÀU MA GIỚI MỜ ẢO KHỚP VỚI ẢNH GỐC */
        body { font-family: 'Segoe UI', sans-serif; background: #120e18; margin: 0; color: white; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* MÀN HÌNH AUTH CÓ MẶT HANAKO-KUN */
        .auth-container { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw;
            /* LINK NỀN TÍM-ĐEN MỜ ẢO */
            background-image: linear-gradient(rgba(18, 14, 24, 0.8), rgba(43, 27, 65, 0.9)), url('https://i.ibb.co/6y4t4mH/Hanako-Background-Maw-Ao.jpg'); 
            background-repeat: no-repeat; background-size: cover; background-position: center;
        }
        
        /* ẢNH MẶT HANAKO-KUN GHÉ MẮT XEM KHẾ ƯỚC */
        #hanako-avatar {
            width: 130px; height: 130px; border-radius: 50%;
            object-fit: cover; border: 4px solid #d175ff; 
            box-shadow: 0 0 20px #d175ff; margin-bottom: -60px; z-index: 10;
            background-color: white; /* Giữ ảnh rõ ràng */
        }
        
        /* Box Auth: Tông màu ma mị mờ ảo */
        .auth-box { 
            background: rgba(43, 27, 65, 0.9); padding: 70px 40px 40px 40px; 
            border-radius: 20px; box-shadow: 0 10px 40px rgba(111, 44, 163, 0.6);
            width: 330px; text-align: center; border: 2px solid #d175ff; z-index: 5;
        }
        
        input, textarea { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #6f2ca3; border-radius: 10px; box-sizing: border-box; 
            background: rgba(18, 14, 24, 0.7); color: white;
        }
        input:focus, textarea:focus { border-color: #d175ff; outline: none; box-shadow: 0 0 10px rgba(209, 117, 255, 0.3); }
        input::placeholder, textarea::placeholder { color: #aaa; }
        
        #msg { margin: 10px 0; padding: 10px; border-radius: 8px; font-size: 0.85rem; text-align: left; line-height: 1.4; }
        .msg-error { background: rgba(255, 0, 0, 0.2); color: #ff9999; border: 1px solid red; }
        .msg-success { background: rgba(0, 255, 0, 0.2); color: #99ff99; border: 1px solid green; }
        
        button { 
            background: #6f2ca3; color: white; border: none; padding: 12px; 
            border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px;
            transition: 0.3s; 
        }
        button:hover { background: #d175ff; box-shadow: 0 0 20px #d175ff; transform: translateY(-1px); }
        button:disabled { background: #444; cursor: not-allowed; }
        
        #toggle-text { cursor:pointer; color:#d175ff; margin-top:15px; font-size:0.85rem; }
        #toggle-text:hover { color: #f0f0f0; text-decoration: underline; }

        /* GIAO DIỆN CHÍNH (HOME) - THƯ VIỆN KHẾ ƯỚC */
        #home-screen {
            display: grid; grid-template-columns: 250px 1fr; 
            height: 100vh; width: 100vw; background: #120e18;
        }

        /* SIDEBAR QUẢN LÝ (BÊN TRÁI) */
        .sidebar {
            background: rgba(43, 27, 65, 0.8); padding: 30px; 
            border-right: 2px solid #6f2ca3; display: flex; flex-direction: column; 
            align-items: center; box-shadow: 4px 0 15px rgba(111, 44, 163, 0.2);
        }
        .sidebar-logo {
            color: #d175ff; font-size: 2rem; font-weight: bold; 
            margin-bottom: 20px; text-shadow: 0 0 10px #d175ff;
        }
        .user-info {
            background: rgba(18, 14, 24, 0.6); border: 1px solid #6f2ca3; 
            padding: 15px; border-radius: 10px; width: 100%; text-align: center;
            margin-bottom: 30px;
        }
        #display-name { color: #d175ff; font-weight: bold; font-size: 1.1rem; }
        #user-points { font-size: 2rem; color: #28a745; margin-top: 10px; display: block; }
        .menu-item {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px;
            background: none; border: 1px solid transparent; color: #aaa;
            cursor: pointer; text-align: left; transition: 0.3s;
        }
        .menu-item:hover, .menu-item.active {
            background: rgba(111, 44, 163, 0.4); border-color: #6f2ca3; color: white;
        }
        .logout-btn { background: #ff4d4d; margin-top: auto; }

        /* NỘI DUNG CHÍNH (BÊN PHẢI) */
        .main-content { padding: 40px; overflow-y: auto; }
        .story-header { margin-bottom: 30px; border-bottom: 2px solid #6f2ca3; padding-bottom: 10px; color: #f0f0f0; }
        
        /* Box Đăng truyện mới */
        .post-box { 
            background: rgba(43, 27, 65, 0.6); padding: 25px; 
            border-radius: 15px; border: 1px solid #6f2ca3; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #post-content { height: 120px; resize: none; margin-bottom: 15px; }

    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <img id="hanako-avatar" src="https://ibb.co/Kpwggr9W">
        <div class="auth-box">
            <h2 id="form-title" style="color: #d175ff;">S-BIDI</h2>
            <input type="text" id="username" class="hidden" placeholder="Tên hiển thị">
            <input type="email" id="gmail" placeholder="Địa chỉ @gmail.com">
            <input type="password" id="password" placeholder="Mật khẩu (8+ ký tự, A, a, 1, @)">
            <div id="msg" class="hidden"></div>
            <button onclick="handleAuth()" id="main-btn">Xác nhận tài khoản</button>
            <p id="toggle-text" onclick="toggleForm()">Chưa có tài khoản? Đăng ký</p>
        </div>
    </div>

    <div id="home-screen" class="hidden">
        
        <aside class="sidebar">
            <div class="sidebar-logo">S-BIDI</div>
            <div class="user-info">
                <span>Hồn ma: <span id="display-name"></span></span>
                <b id="user-points">0</b>
                <span style="font-size:0.7rem; color:#aaa;">Năng lượng tích lũy</span>
            </div>
            
            <button class="menu-item active">Thư viện </button>
            <button class="menu-item">Truyện của tôi</button>
            <button class="menu-item">tài khoản mới</button>
            <button class="menu-item">Cài đặt</button>

            <button onclick="logout()" class="menu-item logout-btn">Hủy bỏ </button>
        </aside>

        <main class="main-content">
            <div class="story-header">
                <h1>Chào mừng đến với Thư viện </h1>
                <p>Nơi chia sẻ những câu chuyện của bạn.</p>
            </div>

            <div class="post-box">
                <textarea id="post-content" placeholder="Viết truyện mới của ông vào đây..."></textarea>
                <div style="text-align: right;">
                    <button onclick="addPost()" id="post-btn" style="width: auto; padding: 12px 25px;">đăng truyện (+10đ ma lực)</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx0TuHaaZ7ivMQqwWd_qsBVZ0sDahsvd80Kn2DwrVKWKSAyhs-1aLC7oD3qW_zk8IPt/exec"; // <-- Nhớ thay link GAS
        let isLogin = true;

        // -- GIỮ NGUYÊN CÁC HÀM XỬ LÝ AUTH ĐÃ FIX BUG --
        function showMsg(t, type) {
            const m = document.getElementById('msg');
            m.innerText = t; m.className = type === 'error' ? 'msg-error' : 'msg-success';
            m.classList.remove('hidden');
        }

        function validatePassword(pass) {
            const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            return regex.test(pass);
        }

        function validateEmail(email) {
            const re = /^[a-zA-Z0-9](\.?[a-zA-Z0-9._%+-])+@gmail\.com$/;
            return re.test(email);
        }

        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? "S-BIDI" : "Đăng Ký";
            document.getElementById('username').classList.toggle('hidden', isLogin);
            document.getElementById('msg').classList.add('hidden');
            document.getElementById('toggle-text').innerText = isLogin ? "Chưa có tài khoản? Đăng ký" : "Đã có tài khoản? Đăng nhập";
        }

        async function handleAuth() {
            const mail = document.getElementById('gmail').value;
            const pass = document.getElementById('password').value;
            const user = document.getElementById('username').value;
            const btn = document.getElementById('main-btn');

            if (!mail || !pass) return showMsg("Thiếu thông tin !", "error");
            if (!validateEmail(mail)) return showMsg("Gmail không dị dạng, phải là tên@gmail.com!", "error");
            if (!isLogin && !validatePassword(pass)) return showMsg("Mật khẩu quá yếu!", "error");

            btn.innerText = "Đang triệu hồi..."; btn.disabled = true;

            try {
                if (isLogin) {
                    const res = await fetch(`${GAS_URL}?action=login&mail=${mail}&pass=${pass}`);
                    const txt = await res.text();
                    if (txt === "FOUND") {
                        saveAndEntry(mail);
                    } else {
                        showMsg("Sai thông tin khế ước!", "error");
                        btn.innerText = "Xác nhận khế ước"; btn.disabled = false;
                    }
                } else {
                    const check = await fetch(`${GAS_URL}?action=check_mail&mail=${mail}`);
                    const checkTxt = await check.text();
                    if (checkTxt === "EXISTED") {
                        showMsg("Gmail này đã lập khế ước!", "error");
                        btn.innerText = "Xác nhận khế ước"; btn.disabled = false;
                    } else {
                        await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "signup", user, pass, mail }) });
                        saveAndEntry(mail, user);
                    }
                }
            } catch (e) {
                showMsg("Lỗi ma pháp hệ thống!", "error");
                btn.disabled = false; btn.innerText = "Xác nhận khế ước";
            }
        }

        function saveAndEntry(mail, name = "") {
            localStorage.setItem("s_bidi_mail", mail);
            localStorage.setItem("s_bidi_name", name || mail.split('@')[0]);
            location.reload();
        }

        // --- CẬP NHẬT CÁCH HIỂN THỊ HOME SAU KHI LOG ---
        window.onload = () => {
            const m = localStorage.getItem("s_bidi_mail");
            const n = localStorage.getItem("s_bidi_name");
            if (m) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('home-screen').classList.remove('hidden');
                document.getElementById('display-name').innerText = n;
                // Có thể thêm hàm fetch lấy điểm thật từ Sheet tại đây
            }
        };

        // --- GIỮ NGUYÊN CHỨC NĂNG ĐĂNG BÀI ---
        async function addPost() {
            const mail = localStorage.getItem("s_bidi_mail");
            const content = document.getElementById('post-content').value;
            if(!content) return;
            const btn = document.getElementById('post-btn');
            btn.innerText = "Đang phong ấn..."; btn.disabled = true;

            await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ action: "addPoint", mail: mail, points: 10 })
            });
            
            document.getElementById('post-content').value = "";
            let p = document.getElementById('user-points');
            p.innerText = parseInt(p.innerText) + 10;
            btn.innerText = "đăng ấn truyện (+10đ ma lực)"; btn.disabled = false;
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
