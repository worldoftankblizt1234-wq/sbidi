<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-BIDI</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        :root { 
            --p-color: #d175ff; 
            --bg-dark: #120e18; 
            --sidebar-bg: rgba(30, 20, 45, 0.95);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); margin: 0; color: white; overflow: hidden; transition: 0.3s; }
        .hidden { display: none !important; }
        
        /* MÀN HÌNH ĐĂNG NHẬP */
        .auth-container { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw;
            background: linear-gradient(rgba(18, 14, 24, 0.8), rgba(43, 27, 65, 0.9)), 
                        url('https://tse1.mm.bing.net/th/id/OIP.TQ4MI__7gTr6dXigGr4WkwHaKQ?rs=1&pid=ImgDetMain&o=7&rm=3'); 
            background-size: cover; background-position: center;
        }
        #hanako-avatar { 
            width: 140px; height: 140px; border-radius: 50%; object-fit: cover; 
            border: 5px solid var(--p-color); box-shadow: 0 0 25px var(--p-color);
            margin-bottom: -70px; z-index: 10;
        }
        .auth-box { 
            background: rgba(43, 27, 65, 0.9); padding: 80px 40px 40px; 
            border-radius: 20px; width: 320px; text-align: center; border: 2px solid var(--p-color);
        }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #6f2ca3; border-radius: 10px; background: rgba(18, 14, 24, 0.7); color: white; box-sizing: border-box; outline: none; }
        button { background: #6f2ca3; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--p-color); box-shadow: 0 0 15px var(--p-color); }

        /* GIAO DIỆN CHÍNH */
        #home-screen { display: grid; grid-template-columns: 260px 1fr; height: 100vh; width: 100vw; }
        .sidebar { background: var(--sidebar-bg); padding: 20px; border-right: 2px solid #6f2ca3; display: flex; flex-direction: column; gap: 5px; overflow-y: auto; }
        .sidebar-logo { color: var(--p-color); font-size: 2rem; font-weight: bold; text-align: center; margin-bottom: 20px; }
        .sidebar-avatar-small { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--p-color); margin: 0 auto 10px; display: block; object-fit: cover; }
        
        .user-info { background: rgba(18, 14, 24, 0.6); border: 1px solid #6f2ca3; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .menu-item { width: 100%; padding: 12px; border-radius: 8px; background: none; border: 1px solid transparent; color: #aaa; cursor: pointer; text-align: left; transition: 0.2s; }
        .menu-item:hover, .menu-item.active { background: rgba(111, 44, 163, 0.4); border-color: #6f2ca3; color: white; }
        .sidebar-label { font-size: 0.7rem; color: #6f2ca3; text-transform: uppercase; font-weight: bold; margin: 15px 0 5px 10px; }

        /* NỘI DUNG */
        .main-content { padding: 40px; overflow-y: auto; background: var(--bg-dark); transition: 0.3s; }
        .card { background: rgba(43, 27, 65, 0.3); padding: 20px; border-radius: 15px; border: 1px solid rgba(111, 44, 163, 0.2); margin-bottom: 20px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(111, 44, 163, 0.1); }
        
        /* TOGGLE SWITCH */
        .toggle { position: relative; width: 40px; height: 20px; appearance: none; background: #333; border-radius: 20px; outline: none; cursor: pointer; transition: .3s; }
        .toggle:checked { background: var(--p-color); }
        .toggle::before { content: ''; position: absolute; width: 14px; height: 14px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: .3s; }
        .toggle:checked::before { left: 23px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <img id="hanako-avatar" src="https://tse3.mm.bing.net/th/id/OIP.udmBUbgmLJ27LmG6Toz-PAHaK-?rs=1&pid=ImgDetMain&o=7&rm=3">
        <div class="auth-box">
            <h2 style="color: var(--p-color); margin-bottom: 20px;">S-BIDI</h2>
            <form onsubmit="handleAuth(event)">
                <input type="text" id="username" class="hidden" placeholder="Tên linh hồn">
                <input type="email" id="gmail" placeholder="Email @gmail.com" required>
                <input type="password" id="password" placeholder="Mật khẩu" required>
                <button type="submit" id="main-btn">Kết nối khế ước</button>
            </form>
            <p onclick="toggleForm()" id="toggle-text" style="cursor:pointer; color:#aaa; font-size:0.8rem; margin-top:15px;">Chưa có tài khoản? Đăng ký</p>
        </div>
    </div>

    <div id="home-screen" class="hidden">
        <aside class="sidebar">
            <div class="sidebar-logo">S-BIDI</div>
            <img class="sidebar-avatar-small" src="https://tse3.mm.bing.net/th/id/OIP.udmBUbgmLJ27LmG6Toz-PAHaK-?rs=1&pid=ImgDetMain&o=7&rm=3">
            <div class="user-info">
                <span style="font-size:0.8rem">Linh hồn: <b id="display-name" style="color:var(--p-color)"></b></span>
                <b id="user-points" style="font-size: 1.8rem; color:#28a745; display:block; margin:5px 0;">0</b>
            </div>

            <div class="sidebar-label">Khám phá</div>
            <button class="menu-item active" onclick="showSection(event, 'home')">🏠 Trang Chủ</button>
            <button class="menu-item" onclick="showSection(event, 'community')">🌍 Cộng đồng</button>
            <button class="menu-item" onclick="showSection(event, 'rank')">🏆 Bảng xếp hạng</button>

            <div class="sidebar-label">Hệ thống</div>
            <button class="menu-item" onclick="showSection(event, 'settings')">⚙️ Cài đặt</button>
            <button onclick="logout()" class="menu-item" style="color: #ff4d4d; margin-top: auto;">🚪 Đăng xuất</button>
        </aside>

        <main class="main-content" id="main-content-area">
            <div id="section-home" class="content-section">
                <h1>Tin vắn ma giới</h1>
                <div class="card"><h3>Chào mừng ông đã trở lại!</h3><p>Hệ thống S-BIDI đã sẵn sàng phục vụ các khế ước của ông.</p></div>
            </div>

            <div id="section-community" class="content-section hidden">
                <h1>🌍 Bảng tin cộng đồng</h1>
                <div class="card">
                    <textarea id="post-input" placeholder="Chia sẻ câu chuyện của ông..."></textarea>
                    <button onclick="publishPost()" id="pub-btn" style="width:auto; padding: 10px 30px;">Đăng bài (+10đ)</button>
                </div>
                <div id="community-feed">Đang triệu hồi...</div>
            </div>

            <div id="section-rank" class="content-section hidden">
                <h1>🏆 Top Ma Lực</h1>
                <div class="card" id="rank-content">Đang quét danh sách...</div>
            </div>

            <div id="section-settings" class="content-section hidden">
                <h1>⚙️ Cài đặt</h1>
                <div class="card">
                    <div class="setting-row"><span>Hiệu ứng sương mù</span><input type="checkbox" class="toggle" id="fog-effect" onchange="applySettings()"></div>
                    <div class="setting-row"><span>Kích thước chữ</span>
                        <select id="font-size" onchange="applySettings()" style="width:auto; margin:0;">
                            <option value="14px">Nhỏ</option>
                            <option value="16px" selected>Vừa</option>
                            <option value="20px">Lớn</option>
                        </select>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxNNzf_3YAyepk1-f_32gk9i5c1aSImLbwm4fuQ570Q3kZMBKQeNwPrRgeteg6CGtDMmw/exec"; 
        let isLogin = true;

        function hashPassword(p) { return CryptoJS.SHA512(p).toString(); }

        function showSection(e, name) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById('section-' + name).classList.remove('hidden');
            if(e) e.currentTarget.classList.add('active');
            if(name === 'community') loadPosts();
            if(name === 'rank') loadRank();
        }

        async function handleAuth(e) {
            e.preventDefault();
            const mail = document.getElementById('gmail').value;
            const pass = document.getElementById('password').value;
            const user = document.getElementById('username').value;
            const passHashed = hashPassword(pass);
            const btn = document.getElementById('main-btn');
            btn.innerText = "Chờ tí..."; btn.disabled = true;

            try {
                if (isLogin) {
                    const res = await fetch(`${GAS_URL}?action=login&mail=${mail}&pass=${passHashed}`);
                    const txt = await res.text();
                    if (txt.includes("FOUND")) saveAndEntry(mail);
                    else { alert("Sai mật khẩu hoặc email!"); btn.disabled = false; btn.innerText = "Kết nối khế ước"; }
                } else {
                    await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "signup", user, pass: passHashed, mail }) });
                    setTimeout(() => saveAndEntry(mail, user), 1000);
                }
            } catch (err) { alert("Lỗi kết nối!"); btn.disabled = false; }
        }

        function saveAndEntry(mail, name = "") {
            localStorage.setItem("s_bidi_mail", mail);
            localStorage.setItem("s_bidi_name", name || mail.split('@')[0]);
            location.reload();
        }

        async function publishPost() {
            const mail = localStorage.getItem("s_bidi_mail");
            const user = localStorage.getItem("s_bidi_name");
            const content = document.getElementById('post-input').value;
            if(!content) return;
            await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "addPost", mail, user, content }) });
            document.getElementById('post-input').value = "";
            alert("Đăng bài thành công!"); loadPosts();
        }

        async function loadPosts() {
            const feed = document.getElementById('community-feed');
            const res = await fetch(`${GAS_URL}?action=getPosts`);
            const posts = await res.json();
            feed.innerHTML = posts.map(p => `<div class="card"><b style="color:var(--p-color)">@${p.user}</b><p>${p.content}</p><small>${new Date(p.time).toLocaleString()}</small></div>`).join('');
        }

        async function loadRank() {
            const content = document.getElementById('rank-content');
            const res = await fetch(`${GAS_URL}?action=getRank`);
            const ranks = await res.json();
            content.innerHTML = ranks.map((r, i) => `<div class="setting-row"><span>#${i+1} ${r.name}</span><b>${r.points}đ</b></div>`).join('');
        }

        function applySettings() {
            const fog = document.getElementById('fog-effect').checked;
            const size = document.getElementById('font-size').value;
            document.getElementById('main-content-area').style.backdropFilter = fog ? "blur(15px)" : "none";
            document.body.style.fontSize = size;
        }

        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('username').classList.toggle('hidden', isLogin);
            document.getElementById('toggle-text').innerText = isLogin ? "Chưa có tài khoản? Đăng ký" : "Đã có tài khoản? Đăng nhập";
        }

        window.onload = () => {
            const m = localStorage.getItem("s_bidi_mail");
            if (m) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('home-screen').classList.remove('hidden');
                document.getElementById('display-name').innerText = localStorage.getItem("s_bidi_name");
            }
        };

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
