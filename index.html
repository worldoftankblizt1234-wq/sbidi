<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <style>
        /* CSS tối giản, hiện đại */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f4f4f9; }
        .hidden { display: none !important; }
        
        /* Auth */
        .auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 2rem; border-radius: 10px; shadow: 0 4px 6px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; }

        /* Navbar */
        .navbar { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .points { background: #f1c40f; color: #333; padding: 4px 12px; border-radius: 15px; font-weight: bold; }
        .hamburger { cursor: pointer; font-size: 24px; user-select: none; }

        /* Side Menu */
        .menu { position: fixed; right: 0; top: 60px; background: white; width: 200px; box-shadow: -2px 0 5px rgba(0,0,0,0.1); display: none; }
        .menu.active { display: block; }
        .menu-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; color: #333; }
        .menu-item:hover { background: #f0f0f0; }
    </style>
</head>
<body>

    <div id="auth-box" class="auth-screen">
        <div class="card">
            <h2 id="title">Đăng Nhập</h2>
            <input type="text" id="user" placeholder="Email">
            <input type="password" id="pass" placeholder="Mật khẩu">
            <button onclick="doAuth()" id="btn">Xác nhận</button>
            <p style="font-size:12px; margin-top:10px; color:blue; cursor:pointer" onclick="swap()">Chưa có nick? Đăng ký</p>
        </div>
    </div>

    <div id="home-box" class="hidden">
        <nav class="navbar">
            <div>S-BIDI</div>
            <div style="display:flex; align-items:center; gap:15px">
                <div class="points"><span id="u-points">0</span> xu</div>
                <div class="hamburger" onclick="toggleM()">☰</div>
            </div>
        </nav>

        <div id="side-menu" class="menu">
            <div class="menu-item" onclick="msg('Trang chủ')">Home</div>
            <div class="menu-item" onclick="msg('Đổi điểm')">Đổi điểm</div>
            <div class="menu-item" onclick="msg('Kết bạn')">Kết bạn</div>
            <div class="menu-item" onclick="msg('Thông báo')">Thông báo</div>
            <div class="menu-item" onclick="msg('Cộng đồng')">Cộng đồng</div>
            <div class="menu-item" style="color:red" onclick="location.reload()">Thoát</div>
        </div>

        <div style="padding:20px; text-align:center">
            <h3>Chào mừng bạn đã vào hệ thống!</h3>
        </div>
    </div>

    <script>
        let isLogin = true;
        function swap() {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "Đăng Nhập" : "Đăng Ký";
        }

        function toggleM() {
            document.getElementById('side-menu').classList.toggle('active');
        }

        function doAuth() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(!u || !p) return alert("Nhập đủ đã Minh ơi!");

            document.getElementById('btn').innerText = "Chờ tí...";
            
            google.script.run.withSuccessHandler(res => {
                if(res.success) {
                    document.getElementById('u-points').innerText = res.points;
                    document.getElementById('auth-box').classList.add('hidden');
                    document.getElementById('home-box').classList.remove('hidden');
                } else {
                    alert(res.msg);
                    document.getElementById('btn').innerText = "Xác nhận";
                }
            }).processAuth(u, p, isLogin ? "signin" : "signup");
        }

        function msg(t) { alert("Tính năng " + t + " đang phát triển!"); toggleM(); }
    </script>
</body>
</html>
