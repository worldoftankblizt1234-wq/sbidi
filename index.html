<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Bidi: Full Tính Năng</title>
    <style>
        :root { --p: #2563eb; --s: #1e293b; --bg: #f8fafc; --accent: #8b5cf6; --orange: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; overflow: hidden; }
        
        /* AUTH & COMMON */
        #auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #2563eb, #8b5cf6); }
        .auth-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); width: 90%; max-width: 400px; text-align: center; }
        input, textarea, .btn-go { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #cbd5e1; box-sizing: border-box; outline: none; }
        .btn-go { background: var(--p); color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        
        /* MAIN APP */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        .nav { background: var(--p); color: white; padding: 15px; display: flex; align-items: center; font-weight: bold; }
        .sidebar { position: fixed; left: -280px; top: 0; width: 260px; height: 100%; background: var(--s); color: white; transition: 0.3s; z-index: 1000; padding-top: 60px; }
        .sidebar.open { left: 0; }
        .sidebar a { display: block; padding: 15px 25px; color: #cbd5e1; text-decoration: none; cursor: pointer; border-bottom: 1px solid #334155; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }

        .page { flex: 1; overflow-y: auto; padding: 20px; display: none; }
        .page.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* SHOP & REDEEM */
        .shop-item { border: 2px dashed var(--orange); padding: 20px; border-radius: 15px; text-align: center; background: #fffbeb; }
        .btn-redeem { background: var(--orange); color: white; padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="color: var(--p)">S-Bidi System</h2>
            <input type="email" id="li-email" placeholder="Gmail">
            <input type="password" id="li-pass" placeholder="Mật khẩu">
            <button class="btn-go" onclick="runAuth()">Vào S-Bidi</button>
            <p id="auth-status" style="font-size: 0.8rem; margin-top:10px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="main-app">
        <div class="nav">
            <div onclick="toggleMenu()" style="cursor:pointer; margin-right:15px">☰ Menu</div>
            <div id="page-title">Trang chủ</div>
        </div>

        <div id="sidebar" class="sidebar">
            <a onclick="goPage('home', '🏠 Trang chủ')">🏠 Trang chủ</a>
            <a onclick="goPage('commu', '🌐 Cộng đồng')">🌐 Cộng đồng</a>
            <a onclick="goPage('noti', '🔔 Thông báo')">🔔 Thông báo</a>
            <a onclick="goPage('shop', '🎁 Đổi quà (Redeem)')">🎁 Đổi quà (Redeem)</a>
            <a onclick="goPage('post', '✍️ Đăng bài')">✍️ Đăng bài</a>
            <a onclick="location.reload()" style="color:#f87171">🚪 Thoát</a>
        </div>
        <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

        <div id="home" class="page active">
            <div class="card">
                <h3>Chào, <span id="u-name" style="color:var(--p)">...</span>!</h3>
                <p>Số dư: <b style="color:orange; font-size: 1.2rem;"><span id="u-points">0</span> ⭐</b></p>
            </div>
        </div>

        <div id="shop" class="page">
            <div class="card shop-item">
                <h2 style="color:var(--orange)">💰 Cửa hàng quà tặng</h2>
                <p>Dùng điểm tích lũy để đổi vật phẩm</p>
                <div style="border-top: 1px solid #fed7aa; margin: 15px 0; padding-top: 15px;">
                    <h3>1.000 ⭐ = 10 Robux</h3>
                    <p style="font-size: 0.8rem; color: #9a3412;">(Admin sẽ duyệt và gửi quà sau 24h)</p>
                    <button class="btn-redeem" onclick="doRedeem()">ĐỔI NGAY</button>
                </div>
            </div>
        </div>

        <div id="commu" class="page"><div class="card"><h3>🌐 Cộng đồng</h3><div id="post-list"></div></div></div>
        <div id="noti" class="page"><div class="card"><h3>🔔 Thông báo</h3><div id="noti-list"></div></div></div>
        <div id="post" class="page"><div class="card"><h3>✍️ Đăng bài</h3><input id="ptitle" placeholder="Tiêu đề"><textarea id="pbody" rows="5"></textarea><button class="btn-go" onclick="sendPost()">Đăng</button></div></div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbGu3sOjQwUBNMBQXcZDuGKgPjXzA2TOmjCFNZfWJtDzyinyzS4NZAwOWu-bHKI3v15/exec';
    let myEmail = "";

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').style.display = document.getElementById('overlay').style.display==='block'?'none':'block';
    }

    function goPage(id, title) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('page-title').innerText = title;
        if(id==='commu') loadPosts();
        if(id==='noti') loadNoti();
        if(document.getElementById('sidebar').classList.contains('open')) toggleMenu();
    }

    // REDEEM FUNCTION
    async function doRedeem() {
        if(!confirm("Minh chắc chắn muốn dùng 1000 sao để đổi quà chứ?")) return;
        try {
            const res = await fetch(`${scriptURL}?action=redeem&email=${myEmail}`);
            const text = await res.text();
            if(text === "REDEEM_OK") {
                alert("🎉 Chúc mừng! Đã gửi yêu cầu đổi quà thành công.");
                location.reload(); // Load lại để trừ điểm
            } else {
                alert("❌ Không đủ điểm rồi Minh ơi, tích cực đăng truyện thêm nhé!");
            }
        } catch(e) { alert("Lỗi kết nối!"); }
    }

    async function runAuth() {
        const email = document.getElementById('li-email').value;
        const pass = document.getElementById('li-pass').value;
        const res = await fetch(`${scriptURL}?action=login&email=${email}&pass=${pass}`);
        const text = await res.text();
        if(text.startsWith("AUTH_OK")) {
            myEmail = email; let d = text.split('|');
            document.getElementById('u-name').innerText = d[1];
            document.getElementById('u-points').innerText = d[2];
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        } else alert("Sai tài khoản!");
    }

    // GIỮ CÁC HÀM loadNoti, loadPosts...
    async function loadNoti() {
        const res = await fetch(`${scriptURL}?action=get_notifications`);
        const data = await res.json();
        document.getElementById('noti-list').innerHTML = data.map(n => `<div class="card" style="border-left:5px solid blue"><b>[${n.type}]</b> ${n.content}</div>`).join('');
    }

    async function loadPosts() {
        const res = await fetch(`${scriptURL}?action=get_posts`);
        const posts = await res.json();
        document.getElementById('post-list').innerHTML = posts.map(p => `<div class="card" style="border-left:5px solid #8b5cf6"><h4>${p.title}</h4><p>${p.body}</p></div>`).join('');
    }

    async function sendPost() {
        const t = document.getElementById('ptitle').value;
        const b = document.getElementById('pbody').value;
        await fetch(`${scriptURL}?action=post_content&type=truyen&title=${encodeURIComponent(t)}&body=${encodeURIComponent(b)}&email=${myEmail}`);
        alert("Xong!"); goPage('commu', 'Cộng đồng');
    }
</script>
</body>
</html>
