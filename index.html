<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Bidi: Kết Nối & Đổi Thưởng</title>
    <style>
        :root { --p: #2563eb; --s: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; overflow: hidden; }
        
        /* AUTH SCREEN */
        #auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 10px; border: none; border-radius: 10px; cursor: pointer; background: #e2e8f0; }
        .tabs button.active { background: var(--p); color: white; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; }
        .btn-go { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-go:disabled { background: #94a3b8; cursor: not-allowed; }

        /* MAIN APP */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        .nav { background: var(--p); color: white; padding: 15px; display: flex; align-items: center; font-weight: bold; font-size: 1.1rem; }
        .sidebar { position: fixed; left: -280px; top: 0; width: 260px; height: 100%; background: var(--s); color: white; transition: 0.3s; z-index: 1000; padding-top: 60px; }
        .sidebar.open { left: 0; }
        .sidebar a { display: block; padding: 15px 25px; color: #cbd5e1; text-decoration: none; border-bottom: 1px solid #334155; cursor: pointer; }
        .sidebar a:hover { background: #334155; color: white; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .page { flex: 1; overflow-y: auto; padding: 20px; display: none; }
        .page.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* FRIEND & SHOP */
        .friend-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .add-btn { background: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
        .point-display { background: #fef3c7; color: #92400e; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2>S-Bidi System</h2>
            <div class="tabs">
                <button id="t-login" class="active" onclick="switchAuth('login')">Đăng nhập</button>
                <button id="t-signup" onclick="switchAuth('signup')">Đăng ký</button>
            </div>
            
            <div id="f-login">
                <input type="email" id="li-email" placeholder="Gmail của bạn">
                <input type="password" id="li-pass" placeholder="Mật khẩu">
                <button class="btn-go" id="btn-login" onclick="runAuth('login')">Đăng nhập</button>
            </div>

            <div id="f-signup" style="display:none">
                <input type="text" id="su-name" placeholder="Tên hiển thị">
                <input type="email" id="su-email" placeholder="Gmail (Example annguyen@gmail.com)">
                <input type="password" id="su-pass" placeholder="Mật khẩu (6+ ký tự)">
                <button class="btn-go" id="btn-signup" onclick="runAuth('signup')">Tạo tài khoản</button>
            </div>
            <p id="auth-status" style="font-size: 0.85rem; margin-top:10px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="main-app">
        <div class="nav">
            <div onclick="toggleMenu()" style="cursor:pointer; margin-right:15px">☰ Menu</div>
            <div id="page-title">Trang chủ</div>
        </div>

        <div id="sidebar" class="sidebar">
            <a onclick="goPage('home', 'Trang chủ')">🏠 Trang chủ</a>
            <a onclick="goPage('friend', 'Kết bạn')">👥 Kết bạn</a>
            <a onclick="goPage('shop', 'Đổi Robux')">💰 Đổi Robux</a>
            <a onclick="location.reload()" style="color:#f87171">🚪 Đăng xuất</a>
        </div>
        <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

        <div id="home" class="page active">
            <div class="card">
                <h3>Chào mừng, <span id="u-name">...</span>!</h3>
                <p>Gmail: <span id="u-email">...</span></p>
                <div style="margin-top:10px">
                    Số dư: <span class="point-display"><span id="u-points">0</span> ⭐</span>
                </div>
            </div>
        </div>

        <div id="friend" class="page">
            <div class="card">
                <h3>Tìm kiếm bạn bè</h3>
                <input type="text" id="f-search" placeholder="Nhập tên bạn học..." onkeyup="searchFriend()">
                <div id="friend-results" style="margin-top:15px">
                    <p style="color:gray; font-size: 0.85rem;">Gợi ý: Tìm bạn lớp 9/2 trường Lý Tự Trọng...</p>
                </div>
            </div>
        </div>

        <div id="shop" class="page">
            <div class="card" style="text-align:center">
                <h3>Cửa hàng Robux</h3>
                <div style="font-size: 2.5rem; margin: 20px 0;">🎮</div>
                <p>Gói: <b>10 Robux</b></p>
                <p>Giá: <span style="color:orange; font-weight:bold">1000 ⭐</span></p>
                <button class="btn-go" id="btn-redeem" onclick="redeemRobux()" style="background:orange">Đổi ngay</button>
                <p id="shop-status" style="font-size: 0.85rem; margin-top:15px"></p>
            </div>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycby9zVSisunsH8ibl2h4pViGd11ItcEco5jm7s5OnCek1rgqCgfuxmQoVvvAy5BfD3yb/exec';
    let userNow = "";
    let emailNow = "";

    function switchAuth(t) {
        document.getElementById('f-login').style.display = t === 'login' ? 'block' : 'none';
        document.getElementById('f-signup').style.display = t === 'signup' ? 'block' : 'none';
        document.getElementById('t-login').className = t === 'login' ? 'active' : '';
        document.getElementById('t-signup').className = t === 'signup' ? 'active' : '';
        document.getElementById('auth-status').innerText = "";
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        const ov = document.getElementById('overlay');
        ov.style.display = ov.style.display === 'block' ? 'none' : 'block';
    }

    function goPage(id, title) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('page-title').innerText = title;
        if(document.getElementById('sidebar').classList.contains('open')) toggleMenu();
    }

    async function runAuth(type) {
        const msg = document.getElementById('auth-status');
        const btn = type === 'login' ? document.getElementById('btn-login') : document.getElementById('btn-signup');
        
        let user = type === 'login' ? '' : document.getElementById('su-name').value.trim();
        let email = (type === 'login' ? document.getElementById('li-email').value : document.getElementById('su-email').value).trim();
        let pass = (type === 'login' ? document.getElementById('li-pass').value : document.getElementById('su-pass').value).trim();

        if (!email || !pass || (type === 'signup' && !user)) {
            msg.style.color = "red"; msg.innerText = "Điền thiếu thông tin kìa Minh!"; return;
        }
        if (pass.length < 6) {
            msg.style.color = "red"; msg.innerText = "Mật khẩu phải từ 6 ký tự!"; return;
        }
        if (!email.toLowerCase().endsWith("@gmail.com")) {
            msg.style.color = "red"; msg.innerText = "Phải dùng đuôi @gmail.com!"; return;
        }

        msg.style.color = "blue"; msg.innerText = "Đang xử lý...";
        btn.disabled = true;

        try {
            const res = await fetch(`${scriptURL}?action=${type}&user=${user}&email=${email}&pass=${pass}`);
            const text = await res.text();

            if (text === "GMAIL_EXISTS") {
                msg.style.color = "red"; msg.innerText = "Gmail này đã có người dùng!";
            } else if (text === "AUTH_FAILED") {
                msg.style.color = "red"; msg.innerText = "Sai Gmail hoặc mật khẩu!";
            } else if (text === "SUCCESS" || text.startsWith("AUTH_OK")) {
                emailNow = email;
                let data = text.split('|');
                userNow = type === 'signup' ? user : data[1];
                let points = type === 'signup' ? 100 : data[2];
                
                document.getElementById('u-name').innerText = userNow;
                document.getElementById('u-email').innerText = email;
                document.getElementById('u-points').innerText = points;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
            }
        } catch (e) {
            msg.style.color = "red"; msg.innerText = "Lỗi kết nối Server!";
        } finally {
            btn.disabled = false;
        }
    }

    function searchFriend() {
        let val = document.getElementById('f-search').value.toLowerCase();
        let res = document.getElementById('friend-results');
        if(val.length < 2) return;
        res.innerHTML = `
            <div class="friend-item">
                <span>👤 <b>${val}</b> (Lý Tự Trọng)</span>
                <button class="add-btn" onclick="this.innerText='Đã gửi'; this.disabled=true">Kết bạn</button>
            </div>
        `;
    }

    async function redeemRobux() {
        let currentP = parseInt(document.getElementById('u-points').innerText);
        if(currentP < 1000) {
            alert("Bạn không đủ 1000 điểm!"); return;
        }
        if(!confirm("Đổi 1000 điểm lấy 10 Robux?")) return;

        const btn = document.getElementById('btn-redeem');
        btn.disabled = true;
        document.getElementById('shop-status').innerText = "Đang giao dịch...";

        try {
            const res = await fetch(`${scriptURL}?action=redeem&email=${emailNow}`);
            const text = await res.text();
            if(text === "REDEEM_OK") {
                document.getElementById('u-points').innerText = currentP - 1000;
                document.getElementById('shop-status').style.color = "green";
                document.getElementById('shop-status').innerText = "Thành công! Robux sẽ được gửi sau 24h.";
            } else {
                alert("Lỗi: Không đủ điểm hoặc lỗi User!");
            }
        } catch (e) { alert("Lỗi kết nối!"); }
        finally { btn.disabled = false; }
    }
</script>
</body>
</html>
