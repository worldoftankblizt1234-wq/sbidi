<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-BIDI - Fixed 100%</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        .hidden { display: none !important; }
        .auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #msg { margin: 10px 0; padding: 10px; border-radius: 8px; font-size: 0.85rem; }
        .msg-error { background: #fee; color: #c33; border: 1px solid #fcc; }
        .msg-success { background: #efe; color: #282; border: 1px solid #cfc; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .navbar { background: #007bff; color: white; padding: 15px 25px; display: flex; justify-content: space-between; }
        .card { background: white; padding: 25px; border-radius: 15px; margin: 20px auto; max-width: 500px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="auth-box">
            <h2 id="form-title">S-BIDI</h2>
            <input type="text" id="username" class="hidden" placeholder="Tên hiển thị">
            <input type="email" id="gmail" placeholder="Gmail (ví dụ sbidi@gmail.com)">
            <input type="password" id="password" placeholder="Mật khẩu">
            <div id="msg" class="hidden"></div>
            <button onclick="handleAuth()" id="main-btn">Xác nhận</button>
            <p id="toggle-text" onclick="toggleForm()" style="color:#007bff; cursor:pointer; font-size:0.8rem; margin-top:15px;">Chưa có tài khoản? Đăng ký</p>
        </div>
    </div>

    <div id="home-screen" class="hidden">
        <nav class="navbar"><b>S-BIDI</b> <span onclick="logout()" style="cursor:pointer">Thoát</span></nav>
        <div class="card">
            <h3>Chào, <span id="display-name"></span></h3>
            <p>Điểm: <b id="user-points" style="font-size: 2.5rem; color: #28a745;">0</b></p>
            <textarea id="post-content" placeholder="Viết gì đó..." style="width:100%; height:80px; margin: 10px 0; border-radius:8px; border:1px solid #ddd; padding:10px;"></textarea>
            <button onclick="addPost()" id="post-btn">Đăng bài (+10đ)</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw_-cKGaO4yZV-vrZfzOeTtuTM1MPQ82vktdEuKZ3eVKZaIAgy7MmgrSuBP1OfifjfK/exec";
        let isLogin = true;

        function showMsg(t, type) {
            const m = document.getElementById('msg');
            m.innerText = t; m.className = type === 'error' ? 'msg-error' : 'msg-success';
            m.classList.remove('hidden');
        }

        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? "Đăng Nhập" : "Đăng Ký";
            document.getElementById('username').classList.toggle('hidden', isLogin);
            document.getElementById('msg').classList.add('hidden');
        }

        async function handleAuth() {
            const mail = document.getElementById('gmail').value;
            const pass = document.getElementById('password').value;
            const user = document.getElementById('username').value;
            const btn = document.getElementById('main-btn');

            if (!mail || !pass) return showMsg("Thiếu thông tin!", "error");
            btn.innerText = "Đang xử lý..."; btn.disabled = true;

            if (isLogin) {
                try {
                    // DIỆT BỌ: Dùng GET để check tài khoản thực tế
                    const res = await fetch(`${GAS_URL}?action=login&mail=${mail}&pass=${pass}`);
                    const txt = await res.text();
                    if (txt === "FOUND") {
                        localStorage.setItem("s_bidi_mail", mail);
                        localStorage.setItem("s_bidi_name", mail.split('@')[0]);
                        location.reload();
                    } else {
                        showMsg("Sai tài khoản hoặc mật khẩu!", "error");
                        btn.innerText = "Xác nhận"; btn.disabled = false;
                    }
                } catch (e) {
                    showMsg("Lỗi xác thực!", "error");
                    btn.disabled = false;
                }
            } else {
                await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "signup", user, pass, mail }) });
                showMsg("Đăng ký xong! Hãy đăng nhập.", "success");
                setTimeout(toggleForm, 1500);
                btn.innerText = "Xác nhận"; btn.disabled = false;
            }
        }

        window.onload = () => {
            const m = localStorage.getItem("s_bidi_mail");
            if (m) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('home-screen').classList.remove('hidden');
                document.getElementById('display-name').innerText = localStorage.getItem("s_bidi_name");
            }
        };

        async function addPost() {
            const mail = localStorage.getItem("s_bidi_mail");
            const content = document.getElementById('post-content').value;
            if(!content) return;
            const btn = document.getElementById('post-btn');
            btn.disabled = true;
            await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "addPoint", mail, points: 10 }) });
            document.getElementById('post-content').value = "";
            let p = document.getElementById('user-points');
            p.innerText = parseInt(p.innerText) + 10;
            btn.disabled = false;
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
