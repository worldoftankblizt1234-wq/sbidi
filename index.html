<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-BIDI - Hanako Library</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --p-color: #d175ff; --bg: #120e18; --sidebar: rgba(25, 15, 35, 0.98); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: white; overflow: hidden; }
        .hidden { display: none !important; }

        /* AUTH SCREEN */
        .auth-container { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh;
            background: linear-gradient(rgba(18, 14, 24, 0.75), rgba(43, 27, 65, 0.85)), 
                        url('https://tse1.mm.bing.net/th/id/OIP.TQ4MI__7gTr6dXigGr4WkwHaKQ?rs=1&pid=ImgDetMain&o=7&rm=3');
            background-size: cover; background-position: center;
        }
        #auth-avt { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--p-color); margin-bottom: -65px; z-index: 10; object-fit: cover; box-shadow: 0 0 20px var(--p-color); }
        .auth-box { background: var(--sidebar); padding: 80px 40px 40px; border-radius: 20px; width: 320px; text-align: center; border: 1px solid var(--p-color); }

        /* MAIN INTERFACE */
        #home-screen { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
        .sidebar { background: var(--sidebar); border-right: 1px solid #444; padding: 20px; display: flex; flex-direction: column; gap: 5px; }
        .sidebar-avt { width: 75px; height: 75px; border-radius: 50%; border: 2px solid var(--p-color); margin: 0 auto 10px; object-fit: cover; }
        .sidebar-label { font-size: 0.7rem; color: #6f2ca3; font-weight: bold; margin: 15px 0 5px 10px; text-transform: uppercase; }
        .menu-item { background: none; border: 1px solid transparent; color: #aaa; padding: 12px; text-align: left; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .menu-item:hover, .menu-item.active { background: rgba(209, 117, 255, 0.15); color: white; border-color: var(--p-color); }

        .main-content { padding: 40px; overflow-y: auto; background: var(--bg); }
        .card { background: rgba(255, 255, 255, 0.04); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #1a1520; color: white; box-sizing: border-box; }
        button { background: #6f2ca3; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: var(--p-color); box-shadow: 0 0 10px var(--p-color); }
        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <img id="auth-avt" src="https://tse3.mm.bing.net/th/id/OIP.udmBUbgmLJ27LmG6Toz-PAHaK-?rs=1&pid=ImgDetMain&o=7&rm=3">
        <div class="auth-box">
            <h2 style="color:var(--p-color); margin-top:0;">S-BIDI</h2>
            <form onsubmit="handleAuth(event)">
                <input type="text" id="username" class="hidden" placeholder="Tên hiển thị">
                <input type="email" id="gmail" placeholder="Gmail @gmail.com" required>
                <input type="password" id="password" placeholder="Mật khẩu" required>
                <button type="submit" id="auth-btn">Ký khế ước</button>
            </form>
            <p onclick="toggleAuth()" id="toggle-txt" style="font-size:0.8rem; cursor:pointer; margin-top:15px; color:#aaa;">Chưa có tài khoản? Đăng ký</p>
        </div>
    </div>

    <div id="home-screen" class="hidden">
        <aside class="sidebar">
            <div style="text-align:center; margin-bottom:15px;">
                <img class="sidebar-avt" src="https://tse3.mm.bing.net/th/id/OIP.udmBUbgmLJ27LmG6Toz-PAHaK-?rs=1&pid=ImgDetMain&o=7&rm=3">
                <b id="side-name">Linh hồn</b><br>
                <small id="side-pts" style="color:var(--p-color)">0đ ma lực</small>
            </div>
            <div class="sidebar-label">Khám phá</div>
            <button class="menu-item active" onclick="tab(event, 'home')">🏠 Trang chủ</button>
            <button class="menu-item" onclick="tab(event, 'comm')">🌍 Cộng đồng</button>
            <button class="menu-item" onclick="tab(event, 'rank')">🏆 Xếp hạng</button>
            <div class="sidebar-label">Cá nhân</div>
            <button class="menu-item" onclick="tab(event, 'prof')">👤 Hồ sơ</button>
            <button class="menu-item" onclick="tab(event, 'find')">🤝 Tìm bạn</button>
            <button onclick="logout()" class="menu-item" style="color:#ff4d4d; margin-top:auto;">🚪 Thoát</button>
        </aside>

        <main class="main-content">
            <div id="tab-home" class="tab-ui">
                <h1>Chào mừng trở lại!</h1>
                <div class="card"><h3>Thông báo</h3><p>Đã cập nhật link GAS mới. Mọi kết nối hiện tại đã thông suốt.</p></div>
            </div>
            <div id="tab-comm" class="tab-ui hidden">
                <h1>🌍 Dòng thời gian</h1>
                <div class="card"><textarea id="p-text" placeholder="Viết khế ước của ông..."></textarea><button onclick="postStory()" id="p-btn">Đăng bài (+10đ)</button></div>
                <div id="comm-list">Loading...</div>
            </div>
            <div id="tab-rank" class="tab-ui hidden">
                <h1>🏆 Top Linh Hồn</h1>
                <div class="card" id="rank-list">Loading...</div>
            </div>
            <div id="tab-prof" class="tab-ui hidden">
                <h1>👤 Hồ sơ cá nhân</h1>
                <div class="card" style="text-align:center;">
                    <img src="https://tse3.mm.bing.net/th/id/OIP.udmBUbgmLJ27LmG6Toz-PAHaK-?rs=1&pid=ImgDetMain&o=7&rm=3" style="width:100px; border-radius:50%; border:3px solid var(--p-color); margin-bottom:15px;">
                    <h2 id="pf-name">---</h2>
                    <p id="pf-mail" style="color:#666;"></p>
                    <b id="pf-pts" style="font-size:2rem; color:#28a745;">0</b><br><small>Điểm ma lực</small>
                </div>
            </div>
            <div id="tab-find" class="tab-ui hidden">
                <h1>🤝 Tìm bạn bè</h1>
                <input type="text" id="search-box" placeholder="Nhập tên..." onkeyup="searchFriend()">
                <div id="find-list"></div>
            </div>
        </main>
    </div>

    <script>
        const GAS = "https://script.google.com/macros/s/AKfycbyfed75G0kHG4mF1XC2QHGc08tUrDReNmNWBgA5zdWs_iSMP03lq7pGThREcWy5EbGZ/exec";
        let authMode = "login";

        function hash(p) { return CryptoJS.SHA512(p).toString(); }

        function toggleAuth() {
            authMode = (authMode === "login") ? "signup" : "login";
            document.getElementById('username').classList.toggle('hidden', authMode === "login");
            document.getElementById('toggle-txt').innerText = authMode === "login" ? "Chưa có tài khoản? Đăng ký" : "Đã có tài khoản? Đăng nhập";
        }

        async function handleAuth(e) {
            e.preventDefault();
            const mail = document.getElementById('gmail').value;
            const pass = hash(document.getElementById('password').value);
            const user = document.getElementById('username').value;
            const btn = document.getElementById('auth-btn');
            btn.disabled = true; btn.innerText = "Đang kết nối...";

            try {
                if (authMode === "login") {
                    const res = await fetch(`${GAS}?action=login&mail=${mail}&pass=${pass}`);
                    const txt = await res.text();
                    if (txt.includes("FOUND")) enter(mail); else alert("Sai tài khoản!");
                } else {
                    const res = await fetch(GAS, { method: "POST", body: JSON.stringify({ action: "signup", user, mail, pass }) });
                    const txt = await res.text();
                    if (txt.includes("EXISTED")) alert("Email đã tồn tại!"); else enter(mail, user);
                }
            } catch (err) { alert("Lỗi kết nối ma giới!"); }
            btn.disabled = false; btn.innerText = "Ký khế ước";
        }

        function enter(m, u = "") {
            localStorage.setItem("sb_mail", m);
            if(u) localStorage.setItem("sb_name", u);
            location.reload();
        }

        function tab(e, t) {
            document.querySelectorAll('.tab-ui').forEach(x => x.classList.add('hidden'));
            document.querySelectorAll('.menu-item').forEach(x => x.classList.remove('active'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            if(e) e.currentTarget.classList.add('active');
            if(t === 'comm') loadPosts(); if(t === 'rank' || t === 'prof') syncData();
        }

        async function postStory() {
            const content = document.getElementById('p-text').value;
            if(!content) return;
            await fetch(GAS, { method: "POST", body: JSON.stringify({ action: "addPost", mail: localStorage.getItem("sb_mail"), user: localStorage.getItem("sb_name"), content }) });
            document.getElementById('p-text').value = ""; loadPosts(); syncData();
        }

        async function loadPosts() {
            const res = await fetch(`${GAS}?action=getPosts`);
            const data = await res.json();
            document.getElementById('comm-list').innerHTML = data.map(p => `<div class="card"><b>@${p.user}</b><p>${p.content}</p></div>`).join('');
        }

        async function syncData() {
            const res
