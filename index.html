<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Truyện - Ngày Xanh Vỡ Mộng</title>
    <style>
        :root { --p: #2563eb; --bg: #f1f5f9; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; }
        
        /* GIAO DIỆN CHÀO MỪNG / AUTH */
        .auth-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-box { background: var(--white); padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .auth-tabs { display: flex; justify-content: center; margin-bottom: 20px; gap: 10px; }
        .auth-tabs button { background: #e2e8f0; color: #64748b; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        .auth-tabs button.active { background: var(--p); color: white; }

        /* FORM NHẬP LIỆU */
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; background: var(--p); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* GIAO DIỆN TRANG CHỦ & SIDEBAR */
        #main-home { display: none; }
        .navbar { background: var(--p); color: white; padding: 15px; display: flex; align-items: center; position: fixed; top: 0; width: 100%; z-index: 100; }
        .menu-icon { font-size: 24px; cursor: pointer; margin-right: 15px; }
        
        .sidebar { position: fixed; left: -250px; top: 0; width: 250px; height: 100%; background: #1e293b; color: white; transition: 0.3s; z-index: 200; padding-top: 60px; }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px 25px; color: #cbd5e1; text-decoration: none; border-bottom: 1px solid #334155; }
        .sidebar a:hover { background: #334155; color: white; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 150; }
        
        .content { margin-top: 80px; padding: 20px; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="auth-box">
            <h2>Chào mừng bạn!</h2>
            <div class="auth-tabs">
                <button id="tab-login" class="active" onclick="showForm('login')">Đăng nhập</button>
                <button id="tab-signup" onclick="showForm('signup')">Đăng ký</button>
            </div>

            <div id="form-login">
                <input type="email" id="login-email" placeholder="Gmail">
                <input type="password" id="login-pass" placeholder="Mật khẩu">
                <button class="btn-main" onclick="handleAuth('login')">Đăng nhập ngay</button>
            </div>

            <div id="form-signup" class="hidden">
                <input type="text" id="reg-user" placeholder="Tên hiển thị">
                <input type="email" id="reg-email" placeholder="Gmail">
                <input type="password" id="reg-pass" placeholder="Mật khẩu">
                <button class="btn-main" onclick="handleAuth('signup')">Tạo tài khoản</button>
            </div>
            <p id="auth-msg" style="color: #ef4444; font-size: 0.8rem; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="main-home">
        <div class="navbar">
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
            <div>Ngày Xanh Vỡ Mộng</div>
        </div>

        <div id="sidebar" class="sidebar">
            <a href="#" onclick="alert('Tính năng Kết bạn sắp ra mắt!')">👤 Add Friend</a>
            <a href="#" onclick="alert('Chuyển đến trang Đăng truyện...')">✍️ Đăng truyện</a>
            <a href="#" onclick="alert('Nhiệm vụ hôm nay: Đọc 1 chương truyện')">📜 Daily Quest</a>
            <a href="#" onclick="alert('Bạn có 0 điểm. Cần thêm để đổi Robux!')">💰 Đổi điểm</a>
            <a href="#" onclick="location.reload()" style="color: #f87171;">🚪 Đăng xuất</a>
        </div>
        <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

        <div class="content">
            <h1 id="welcome-user">Chào mừng, ...</h1>
            <p>Bạn đã đăng nhập thành công vào hệ thống của Minh.</p>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxlVrHMz_9yMbfhk0yiqallOnBafc4TKHpiU9vvHL5j-43RMomAoZ6jLQQMHieRwjfR/exec';

    function showForm(type) {
        document.getElementById('form-login').classList.toggle('hidden', type === 'signup');
        document.getElementById('form-signup').classList.toggle('hidden', type === 'login');
        document.getElementById('tab-login').classList.toggle('active', type === 'login');
        document.getElementById('tab-signup').classList.toggle('active', type === 'signup');
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        const overlay = document.getElementById('overlay');
        overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
    }

    function handleAuth(type) {
        const msg = document.getElementById('auth-msg');
        msg.innerText = "Đang xử lý...";
        
        let data = {};
        if(type === 'login') {
            data = { action: 'auth', email: document.getElementById('login-email').value, pass: document.getElementById('login-pass').value, user: 'LoginUser' };
        } else {
            data = { action: 'auth', user: document.getElementById('reg-user').value, email: document.getElementById('reg-email').value, pass: document.getElementById('reg-pass').value };
        }

        fetch(scriptURL, { method: 'POST', body: new URLSearchParams(data) })
        .then(() => {
            document.getElementById('welcome-user').innerText = "Chào mừng, " + (data.user || "Bạn");
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-home').style.display = 'block';
        })
        .catch(() => {
            // Cho phép vào nếu có lỗi mạng nhưng vẫn gửi dữ liệu thành công
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-home').style.display = 'block';
        });
    }
</script>
</body>
</html>
